<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор: блогер + трафик + продажи</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.12);
    --accent-dim2: rgba(200,241,53,0.06);
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #444;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Unbounded', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 0;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  header p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: calc(100vh - 81px);
  }

  .panel {
    padding: 32px;
    border-right: 1px solid var(--border);
  }

  .panel-right {
    padding: 32px;
    border-right: none;
  }

  .panel-title {
    font-family: var(--display);
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .slider-block {
    margin-bottom: 24px;
  }

  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .slider-name {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .slider-value {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    min-width: 80px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
    position: relative;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 0 0 4px var(--accent-dim);
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  input[type=range]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  .mode-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .mode-btn {
    flex: 1;
    padding: 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .big-number {
    font-family: var(--display);
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
    transition: color 0.3s;
  }

  .big-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 32px;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }

  .metric-card-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .metric-card-val {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .breakdown-row:last-child {
    border-bottom: none;
  }

  .breakdown-label {
    color: var(--muted);
  }

  .breakdown-val {
    font-weight: 500;
  }

  .breakdown-val.pos { color: var(--green); }
  .breakdown-val.neg { color: var(--red); }

  .breakdown-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    background: var(--surface2);
    font-size: 15px;
    font-weight: 700;
    border-top: 1px solid var(--border);
  }

  .verdict {
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 12px;
    line-height: 1.7;
    margin-bottom: 24px;
    border-left: 3px solid;
    transition: all 0.3s;
  }

  .verdict.good { background: rgba(74,222,128,0.08); border-color: var(--green); color: var(--green); }
  .verdict.warn { background: rgba(251,191,36,0.08); border-color: var(--yellow); color: var(--yellow); }
  .verdict.bad  { background: rgba(248,113,113,0.08); border-color: var(--red); color: var(--red); }

  .tip-box {
    background: var(--accent-dim2);
    border: 1px solid rgba(200,241,53,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }

  .tip-box strong {
    color: var(--accent);
    font-weight: 500;
  }

  .roas-bar-wrap {
    margin-top: 20px;
  }

  .roas-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .roas-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .roas-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
    max-width: 100%;
  }

  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
    .panel { border-right: none; border-bottom: 1px solid var(--border); }
    .big-number { font-size: 36px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <div>
    <h1>Unit-экономика · блогер + трафик + продажи</h1>
    <p>Меняй параметры — результат обновляется мгновенно</p>
  </div>
</header>

<div class="layout">
  <div class="panel">
    <div class="panel-title">Параметры</div>

    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('both')" id="btn-both">Трафик + продажи</button>
      <button class="mode-btn" onclick="setMode('sales')" id="btn-sales">Только продажи</button>
    </div>

    <div id="ad-block" class="slider-block">
      <div class="slider-header">
        <span class="slider-name">Бюджет на рекламу / мес</span>
        <span class="slider-value" id="adLabel">€1 000</span>
      </div>
      <input type="range" min="200" max="5000" step="100" value="1000" oninput="calc()" id="ad">
    </div>

    <div id="cpl-block" class="slider-block">
      <div class="slider-header">
        <span class="slider-name">Стоимость одного лида (CPL)</span>
        <span class="slider-value" id="cplLabel">€15</span>
      </div>
      <input type="range" min="3" max="150" step="1" value="15" oninput="calc()" id="cpl">
    </div>

    <div id="leads-block" class="slider-block" style="display:none">
      <div class="slider-header">
        <span class="slider-name">Лидов от блогера / мес</span>
        <span class="slider-value" id="leadsLabel">5
